<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>집중 타이머</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f0f13;
    --panel: #1a1a24;
    --panel-2: #15151d;
    --text: #f1f1f5;
    --muted: #888;
    --border: #2a2a38;
    --inactive: #333;
    --shadow: rgba(0, 0, 0, 0.2);
  }
  body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 32px;
  }
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    background: var(--panel);
    border-radius: 12px;
    padding: 4px;
  }
  .tab {
    padding: 8px 24px;
    border-radius: 9px;
    border: none;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    background: transparent;
    color: var(--muted);
    transition: all .2s;
  }
  .tab.active { color: #fff; }
  .panel { display: none; width: 100%; max-width: 420px; }
  .panel.active { display: block; }
  #timer-panel {
    display: none;
    flex-direction: column;
    align-items: center;
  }
  #timer-panel.active { display: flex; }
  .modes { display: flex; gap: 8px; margin-bottom: 18px; flex-wrap: wrap; justify-content: center; }
  .mode-btn {
    padding: 7px 16px;
    border-radius: 20px;
    border: 2px solid var(--inactive);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    font-weight: 700;
    font-size: 13px;
    transition: all .2s;
  }
  .settings {
    width: 100%;
    background: var(--panel);
    border-radius: 16px;
    padding: 16px;
    margin-bottom: 18px;
    box-shadow: 0 10px 30px var(--shadow);
  }
  .settings-title {
    font-size: 13px;
    color: #aaa;
    font-weight: 700;
    margin-bottom: 14px;
  }
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    border: 1px solid var(--border);
    background: var(--panel-2);
    color: var(--text);
    border-radius: 10px;
    padding: 10px 12px;
    outline: none;
    font-size: 14px;
  }
  .circle-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 26px; }
  #timer-svg { transform: rotate(-90deg); }
  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  #time-display { font-size: 52px; font-weight: 800; letter-spacing: 2px; }
  #mode-label { font-size: 13px; color: var(--muted); margin-top: 4px; }
  #session-hint { font-size: 12px; color: #666; margin-top: 6px; }
  .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  button { -webkit-tap-highlight-color: transparent; }
  .btn-start, .btn-reset {
    padding: 14px 20px;
    border-radius: 14px;
    font-weight: 800;
    font-size: 16px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-start {
    min-width: 146px;
    border: none;
    color: #fff;
  }
  .btn-reset {
    border: 2px solid var(--inactive);
    background: transparent;
    color: var(--muted);
  }
  .helper-text {
    font-size: 12px;
    color: #666;
    margin-top: 14px;
    text-align: center;
  }
  .summary { display: flex; gap: 12px; margin-bottom: 24px; }
  .summary-card { flex: 1; background: var(--panel); border-radius: 14px; padding: 18px 20px; }
  .summary-card .s-label { font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .summary-card .s-val { font-size: 28px; font-weight: 800; }
  .chart-box, .recent-box, .insight-box {
    background: var(--panel);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .box-title { font-size: 13px; font-weight: 700; color: #aaa; margin-bottom: 20px; }
  .bars { display: flex; align-items: flex-end; gap: 8px; height: 120px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; justify-content: flex-end; }
  .bar-val { font-size: 10px; color: #666; }
  .bar { width: 100%; border-radius: 6px; min-height: 4px; transition: height .4s; }
  .bar-day { font-size: 11px; color: #666; margin-top: 4px; }
  .session-row { display: flex; justify-content: space-between; gap: 12px; padding: 10px 0; border-bottom: 1px solid #252530; font-size: 13px; }
  .session-row:last-child { border-bottom: none; }
  .no-sessions { color: #555; font-size: 13px; }
  .insight-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
  .insight-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
  }
  .insight-card .label { font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .insight-card .value { font-size: 20px; font-weight: 800; }
  @media (max-width: 460px) {
    .settings-grid, .insight-grid { grid-template-columns: 1fr; }
    .summary { flex-direction: column; }
    .tab { padding: 8px 18px; }
    #time-display { font-size: 46px; }
  }
</style>
</head>
<body>
<div class="tabs">
  <button class="tab active" id="tab-timer" onclick="switchTab('timer')">타이머</button>
  <button class="tab" id="tab-stats" onclick="switchTab('stats')">통계</button>
</div>

<div id="timer-panel" class="panel active">
  <div class="modes">
    <button class="mode-btn" id="mode-focus" onclick="switchMode(0)">집중</button>
    <button class="mode-btn" id="mode-short" onclick="switchMode(1)">짧은 휴식</button>
    <button class="mode-btn" id="mode-long" onclick="switchMode(2)">긴 휴식</button>
  </div>

  <div class="settings">
    <div class="settings-title">시간 설정</div>
    <div class="settings-grid">
      <div class="field">
        <label for="focus-minutes">집중</label>
        <input id="focus-minutes" type="number" min="1" max="180" inputmode="numeric">
      </div>
      <div class="field">
        <label for="short-minutes">짧은 휴식</label>
        <input id="short-minutes" type="number" min="1" max="60" inputmode="numeric">
      </div>
      <div class="field">
        <label for="long-minutes">긴 휴식</label>
        <input id="long-minutes" type="number" min="1" max="120" inputmode="numeric">
      </div>
    </div>
  </div>

  <div class="circle-wrap">
    <svg id="timer-svg" width="220" height="220" aria-hidden="true">
      <circle cx="110" cy="110" r="100" fill="none" stroke="#1e1e2e" stroke-width="12"></circle>
      <circle id="progress-ring" cx="110" cy="110" r="100" fill="none" stroke-width="12"
        stroke-dasharray="628.3" stroke-dashoffset="628.3" stroke-linecap="round"></circle>
    </svg>
    <div class="timer-text">
      <span id="time-display">25:00</span>
      <span id="mode-label">집중</span>
      <span id="session-hint">정확한 종료 시각 기반</span>
    </div>
  </div>

  <div class="controls">
    <button class="btn-start" id="btn-start" onclick="handleStartPause()">시작</button>
    <button class="btn-reset" onclick="handleReset()">리셋</button>
  </div>
  <div class="helper-text">스페이스: 시작/일시정지 · R: 리셋 · 1/2/3: 모드 변경</div>
</div>

<div id="stats-panel" class="panel">
  <div class="summary">
    <div class="summary-card">
      <div class="s-label">오늘 집중</div>
      <div class="s-val" id="today-mins">0분</div>
    </div>
    <div class="summary-card">
      <div class="s-label">완료 세션</div>
      <div class="s-val" id="today-count">0회</div>
    </div>
  </div>

  <div class="insight-box">
    <div class="box-title">빠른 인사이트</div>
    <div class="insight-grid">
      <div class="insight-card">
        <div class="label">이번 주 집중</div>
        <div class="value" id="week-total">0분</div>
      </div>
      <div class="insight-card">
        <div class="label">연속 집중 일수</div>
        <div class="value" id="streak-days">0일</div>
      </div>
    </div>
  </div>

  <div class="chart-box">
    <div class="box-title">주간 집중 기록</div>
    <div class="bars" id="week-bars"></div>
  </div>

  <div class="recent-box">
    <div class="box-title">최근 세션</div>
    <div id="recent-list"><div class="no-sessions">아직 세션 기록이 없어요.</div></div>
  </div>
</div>

<script>
const DEFAULT_DURATIONS = {
  focus: 25 * 60,
  short: 5 * 60,
  long: 15 * 60,
};

const SETTINGS_KEY = 'focus_timer_settings_v2';
const SESSIONS_KEY = 'focus_timer_sessions_v2';
const STATE_KEY = 'focus_timer_state_v2';
const CIRC = 2 * Math.PI * 100;

const MODES = [
  { key: 'focus', label: '집중', color: '#6366f1' },
  { key: 'short', label: '짧은 휴식', color: '#22c55e' },
  { key: 'long', label: '긴 휴식', color: '#0ea5e9' },
];

const state = {
  modeIdx: 0,
  timeLeft: DEFAULT_DURATIONS.focus,
  running: false,
  timerId: null,
  endTime: null,
  startedAt: null,
};

function getDurations() {
  try {
    const raw = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    return {
      focus: clampMinutes(raw.focus, 1, 180, 25) * 60,
      short: clampMinutes(raw.short, 1, 60, 5) * 60,
      long: clampMinutes(raw.long, 1, 120, 15) * 60,
    };
  } catch {
    return { ...DEFAULT_DURATIONS };
  }
}

function saveDurations(durations) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify({
    focus: Math.round(durations.focus / 60),
    short: Math.round(durations.short / 60),
    long: Math.round(durations.long / 60),
  }));
}

function getModeDuration(modeIdx = state.modeIdx) {
  const d = getDurations();
  return d[MODES[modeIdx].key];
}

function getSessions() {
  try {
    const parsed = JSON.parse(localStorage.getItem(SESSIONS_KEY) || '[]');
    return Array.isArray(parsed) ? parsed : [];
  } catch {
    return [];
  }
}

function saveSessions(sessions) {
  localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions));
}

function addSession({ type, plannedSeconds, actualSeconds, startedAt, endedAt, completed }) {
  const sessions = getSessions();
  sessions.push({
    id: crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
    type,
    plannedSeconds,
    actualSeconds,
    mins: Math.round(actualSeconds / 60),
    startedAt,
    endedAt,
    ts: endedAt,
    completed,
  });
  saveSessions(sessions);
}

function saveState() {
  const payload = {
    modeIdx: state.modeIdx,
    timeLeft: state.timeLeft,
    running: state.running,
    endTime: state.endTime,
    startedAt: state.startedAt,
  };
  localStorage.setItem(STATE_KEY, JSON.stringify(payload));
}

function clearSavedState() {
  localStorage.removeItem(STATE_KEY);
}

function restoreState() {
  try {
    const raw = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
    if (!raw) return;
    state.modeIdx = Number.isInteger(raw.modeIdx) ? raw.modeIdx : 0;
    state.startedAt = typeof raw.startedAt === 'number' ? raw.startedAt : null;
    state.endTime = typeof raw.endTime === 'number' ? raw.endTime : null;
    state.running = Boolean(raw.running);

    if (state.running && state.endTime) {
      const remaining = Math.ceil((state.endTime - Date.now()) / 1000);
      if (remaining <= 0) {
        state.timeLeft = 0;
        finishSession(true);
        return;
      }
      state.timeLeft = remaining;
      startTicking();
    } else {
      state.running = false;
      state.timeLeft = typeof raw.timeLeft === 'number' ? raw.timeLeft : getModeDuration(state.modeIdx);
    }
  } catch {
    state.modeIdx = 0;
    state.timeLeft = getModeDuration(0);
    state.running = false;
    state.endTime = null;
    state.startedAt = null;
  }
}

function clampMinutes(value, min, max, fallback) {
  const n = Number(value);
  if (!Number.isFinite(n)) return fallback;
  return Math.min(max, Math.max(min, Math.round(n)));
}

function formatTime(seconds) {
  const safe = Math.max(0, seconds);
  const mm = String(Math.floor(safe / 60)).padStart(2, '0');
  const ss = String(safe % 60).padStart(2, '0');
  return `${mm}:${ss}`;
}

function updateDisplay() {
  const duration = getModeDuration();
  document.getElementById('time-display').textContent = formatTime(state.timeLeft);
  const progress = 1 - state.timeLeft / duration;
  document.getElementById('progress-ring').style.strokeDashoffset = CIRC * (1 - progress);
}

function updateButtons() {
  document.getElementById('btn-start').textContent = state.running ? '일시정지' : (state.timeLeft === getModeDuration() ? '시작' : '재개');
}

function applyTheme() {
  const mode = MODES[state.modeIdx];
  document.getElementById('mode-label').textContent = mode.label;
  document.getElementById('progress-ring').style.stroke = mode.color;
  const startBtn = document.getElementById('btn-start');
  startBtn.style.background = mode.color;
  startBtn.style.boxShadow = `0 4px 20px ${mode.color}55`;

  ['timer', 'stats'].forEach((tab) => {
    const el = document.getElementById(`tab-${tab}`);
    const active = el.classList.contains('active');
    el.style.background = active ? mode.color : 'transparent';
    el.style.color = active ? '#fff' : '#888';
  });

  MODES.forEach((md, idx) => {
    const btn = document.getElementById(['mode-focus', 'mode-short', 'mode-long'][idx]);
    btn.style.borderColor = idx === state.modeIdx ? md.color : '#333';
    btn.style.color = idx === state.modeIdx ? md.color : '#888';
    btn.style.background = idx === state.modeIdx ? `${md.color}22` : 'transparent';
  });

  document.getElementById('today-mins').style.color = mode.color;
  document.getElementById('today-count').style.color = mode.color;
}

function syncSettingsInputs() {
  const durations = getDurations();
  document.getElementById('focus-minutes').value = Math.round(durations.focus / 60);
  document.getElementById('short-minutes').value = Math.round(durations.short / 60);
  document.getElementById('long-minutes').value = Math.round(durations.long / 60);
}

function applyMode(resetTime = false) {
  if (resetTime) {
    state.timeLeft = getModeDuration();
  }
  applyTheme();
  updateButtons();
  updateDisplay();
  saveState();
}

function switchMode(idx) {
  if (state.running) pauseTimer();
  state.modeIdx = idx;
  state.startedAt = null;
  state.endTime = null;
  state.timeLeft = getModeDuration(idx);
  applyMode();
}

function startTicking() {
  clearInterval(state.timerId);
  state.timerId = setInterval(() => {
    if (!state.endTime) return;
    const remaining = Math.ceil((state.endTime - Date.now()) / 1000);
    state.timeLeft = Math.max(0, remaining);
    updateDisplay();
    saveState();
    if (remaining <= 0) {
      finishSession(true);
    }
  }, 250);
}

function startTimer() {
  if (!state.startedAt) state.startedAt = Date.now();
  state.endTime = Date.now() + state.timeLeft * 1000;
  state.running = true;
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission().catch(() => {});
  }
  startTicking();
  updateButtons();
  saveState();
}

function pauseTimer() {
  if (!state.running) return;
  clearInterval(state.timerId);
  state.timerId = null;
  if (state.endTime) {
    state.timeLeft = Math.max(0, Math.ceil((state.endTime - Date.now()) / 1000));
  }
  state.running = false;
  state.endTime = null;
  updateButtons();
  updateDisplay();
  saveState();
}

function finishSession(completed = true) {
  clearInterval(state.timerId);
  state.timerId = null;
  const duration = getModeDuration();
  const endedAt = Date.now();
  const startedAt = state.startedAt || (endedAt - duration * 1000);
  const actualSeconds = completed ? duration : Math.max(0, duration - state.timeLeft);

  if (actualSeconds > 0) {
    addSession({
      type: MODES[state.modeIdx].key,
      plannedSeconds: duration,
      actualSeconds,
      startedAt,
      endedAt,
      completed,
    });
  }

  state.running = false;
  state.endTime = null;
  state.startedAt = null;
  state.timeLeft = 0;
  updateButtons();
  updateDisplay();
  clearSavedState();

  try {
    if ('Notification' in window && Notification.permission === 'granted') {
      new Notification('세션 완료!', { body: `${MODES[state.modeIdx].label} 세션이 끝났습니다.` });
    }
  } catch {}

  if (navigator.vibrate) navigator.vibrate([120, 80, 120]);
  if (document.getElementById('stats-panel').classList.contains('active')) {
    renderStats();
  }
}

function handleStartPause() {
  if (state.running) {
    pauseTimer();
  } else {
    startTimer();
  }
}

function handleReset() {
  clearInterval(state.timerId);
  state.timerId = null;
  state.running = false;
  state.endTime = null;
  state.startedAt = null;
  state.timeLeft = getModeDuration();
  updateButtons();
  updateDisplay();
  saveState();
}

function switchTab(tab) {
  const isTimer = tab === 'timer';
  document.getElementById('timer-panel').classList.toggle('active', isTimer);
  document.getElementById('stats-panel').classList.toggle('active', !isTimer);

  ['timer', 'stats'].forEach((name) => {
    const el = document.getElementById(`tab-${name}`);
    el.classList.toggle('active', name === tab);
  });

  applyTheme();
  if (!isTimer) renderStats();
}

function sameLocalDay(tsA, tsB) {
  const a = new Date(tsA);
  const b = new Date(tsB);
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}

function formatSessionTime(ts) {
  return new Date(ts).toLocaleTimeString('ko-KR', {
    hour: '2-digit',
    minute: '2-digit',
  });
}

function computeStreak(focusSessions) {
  const uniqueDays = [...new Set(focusSessions.map((s) => {
    const d = new Date(s.endedAt || s.ts);
    return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
  }))];

  if (!uniqueDays.length) return 0;

  let streak = 0;
  let cursor = new Date();
  cursor.setHours(0, 0, 0, 0);

  while (true) {
    const key = `${cursor.getFullYear()}-${cursor.getMonth()}-${cursor.getDate()}`;
    if (!uniqueDays.includes(key)) break;
    streak += 1;
    cursor.setDate(cursor.getDate() - 1);
  }

  return streak;
}

function renderStats() {
  const sessions = getSessions();
  const focusSessions = sessions.filter((s) => s.type === 'focus');
  const now = new Date();
  const todayFocus = focusSessions.filter((s) => sameLocalDay(s.endedAt || s.ts, now));
  const totalTodayMinutes = todayFocus.reduce((sum, s) => sum + Math.round((s.actualSeconds || 0) / 60), 0);
  const weekData = Array.from({ length: 7 }, (_, idx) => {
    const target = new Date();
    target.setHours(0, 0, 0, 0);
    target.setDate(target.getDate() - (6 - idx));
    const minutes = focusSessions
      .filter((s) => sameLocalDay(s.endedAt || s.ts, target))
      .reduce((sum, s) => sum + Math.round((s.actualSeconds || 0) / 60), 0);
    return {
      day: ['일', '월', '화', '수', '목', '금', '토'][target.getDay()],
      minutes,
      isToday: sameLocalDay(target, now),
    };
  });

  const weekTotal = weekData.reduce((sum, item) => sum + item.minutes, 0);
  const streak = computeStreak(focusSessions);
  const color = MODES[state.modeIdx].color;

  document.getElementById('today-mins').textContent = `${totalTodayMinutes}분`;
  document.getElementById('today-count').textContent = `${todayFocus.length}회`;
  document.getElementById('week-total').textContent = `${weekTotal}분`;
  document.getElementById('streak-days').textContent = `${streak}일`;

  const maxMinutes = Math.max(...weekData.map((item) => item.minutes), 1);
  document.getElementById('week-bars').innerHTML = weekData.map((item) => `
    <div class="bar-col">
      <div class="bar-val">${item.minutes > 0 ? `${item.minutes}m` : ''}</div>
      <div class="bar" style="height:${Math.max((item.minutes / maxMinutes) * 80, item.minutes > 0 ? 6 : 4)}px;background:${item.minutes > 0 ? color : '#2a2a38'}"></div>
      <div class="bar-day" style="color:${item.isToday ? color : '#666'}">${item.day}</div>
    </div>
  `).join('');

  const recent = [...sessions].reverse().slice(0, 6);
  const recentEl = document.getElementById('recent-list');
  if (!recent.length) {
    recentEl.innerHTML = '<div class="no-sessions">아직 세션 기록이 없어요.</div>';
    return;
  }

  recentEl.innerHTML = recent.map((session) => {
    const mode = MODES.find((item) => item.key === session.type) || MODES[0];
    const minutes = Math.round((session.actualSeconds || 0) / 60);
    const suffix = session.completed ? '완료' : '중단';
    return `<div class="session-row"><span style="color:${mode.color}">${mode.label}</span><span style="color:#666">${minutes}분 · ${formatSessionTime(session.endedAt || session.ts)} · ${suffix}</span></div>`;
  }).join('');
}

function handleSettingsChange() {
  const nextDurations = {
    focus: clampMinutes(document.getElementById('focus-minutes').value, 1, 180, 25) * 60,
    short: clampMinutes(document.getElementById('short-minutes').value, 1, 60, 5) * 60,
    long: clampMinutes(document.getElementById('long-minutes').value, 1, 120, 15) * 60,
  };
  saveDurations(nextDurations);

  if (!state.running) {
    state.timeLeft = nextDurations[MODES[state.modeIdx].key];
    updateButtons();
    updateDisplay();
    saveState();
  }
}

function bindEvents() {
  document.getElementById('focus-minutes').addEventListener('change', handleSettingsChange);
  document.getElementById('short-minutes').addEventListener('change', handleSettingsChange);
  document.getElementById('long-minutes').addEventListener('change', handleSettingsChange);

  document.addEventListener('keydown', (event) => {
    const tag = document.activeElement?.tagName;
    const typing = tag === 'INPUT' || tag === 'TEXTAREA';
    if (typing) return;

    if (event.code === 'Space') {
      event.preventDefault();
      handleStartPause();
    } else if (event.key === 'r' || event.key === 'R') {
      handleReset();
    } else if (event.key === '1') {
      switchMode(0);
    } else if (event.key === '2') {
      switchMode(1);
    } else if (event.key === '3') {
      switchMode(2);
    }
  });

  document.addEventListener('visibilitychange', () => {
    if (state.running && state.endTime) {
      state.timeLeft = Math.max(0, Math.ceil((state.endTime - Date.now()) / 1000));
      updateDisplay();
      saveState();
    }
  });
}

syncSettingsInputs();
restoreState();
bindEvents();
applyMode(!state.running && !localStorage.getItem(STATE_KEY));
if (!state.running && !state.timeLeft) {
  state.timeLeft = getModeDuration();
  updateDisplay();
}
renderStats();
</script>
</body>
</html>
